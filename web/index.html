<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF → Markdown (WASM test)</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.5;
    }
    label { display: block; margin-bottom: 1rem; }
    pre {
      background: #f4f4f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 1rem;
      overflow: auto;
      max-height: 70vh;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .error { color: #b00020; }
    .status { color: #555; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>PDF → Markdown</h1>
  <p>Local WASM test — pick a PDF; conversion runs entirely in your browser.</p>

  <label>
    PDF file
    <input id="file" type="file" accept="application/pdf" />
  </label>

  <p id="status" class="status">Load a PDF to convert.</p>
  <pre id="output"></pre>

  <script type="module">
    import { convertPdfToMarkdown } from "./app.js";

    const fileInput = document.getElementById("file");
    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files?.[0];
      if (!file) return;

      statusEl.textContent = `Converting ${file.name}…`;
      statusEl.className = "status";
      outputEl.textContent = "";

      try {
        const bytes = new Uint8Array(await file.arrayBuffer());
        const markdown = await convertPdfToMarkdown(bytes);
        outputEl.textContent = markdown;
        statusEl.textContent = `Done — ${file.name} (${bytes.length.toLocaleString()} bytes)`;
      } catch (err) {
        statusEl.textContent = err instanceof Error ? err.message : String(err);
        statusEl.className = "status error";
      }
    });
  </script>
</body>
</html>
