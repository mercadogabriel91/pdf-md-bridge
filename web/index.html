<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF → Markdown (WASM test)</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      line-height: 1.5;
    }
    label { display: block; margin-bottom: 1rem; }
    .error { color: #b00020; }
    .status { color: #555; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>PDF → Markdown</h1>
  <p>Local WASM test — pick a PDF; the converted Markdown downloads automatically.</p>

  <label>
    PDF file
    <input id="file" type="file" accept="application/pdf" />
  </label>

  <p id="status" class="status">Load a PDF to convert.</p>

  <script type="module">
    import { convertPdfToMarkdown } from "./app.js";

    const fileInput = document.getElementById("file");
    const statusEl = document.getElementById("status");

    function markdownFilename(pdfName) {
      const lower = pdfName.toLowerCase();
      if (lower.endsWith(".pdf")) {
        return pdfName.slice(0, -4) + ".md";
      }
      return pdfName + ".md";
    }

    function downloadMarkdown(markdown, filename) {
      const blob = new Blob([markdown], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files?.[0];
      if (!file) return;

      const outName = markdownFilename(file.name);

      statusEl.textContent = `Converting ${file.name} in background…`;
      statusEl.className = "status";

      try {
        const bytes = new Uint8Array(await file.arrayBuffer());
        const markdown = await convertPdfToMarkdown(bytes);
        downloadMarkdown(markdown, outName);
        statusEl.textContent =
          `Downloaded ${outName} — from ${file.name} (${file.size.toLocaleString()} bytes)`;
      } catch (err) {
        statusEl.textContent = err instanceof Error ? err.message : String(err);
        statusEl.className = "status error";
      }
    });
  </script>
</body>
</html>
